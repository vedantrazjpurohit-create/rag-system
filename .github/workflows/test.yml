name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          HF_HOME: ${{ github.workspace }}/.hf_cache
          PDF_PARSE_IN_PROCESS: "true"
        run: python -m pytest api/tests eval/tests -q
      - name: pip-audit (prod deps)
        run: pip install pip-audit && pip-audit -r requirements-prod.txt || true

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        run: npm ci && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://rag-system-api.onrender.com