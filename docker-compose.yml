services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/app/.hf_cache
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - XAI_API_KEY=${XAI_API_KEY:-}
    volumes:
      - hf_cache:/app/.hf_cache
      - eval_results:/app/results

  web:
    image: node:24-alpine
    working_dir: /app/web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./web:/app/web
      - web_node_modules:/app/web/node_modules
    depends_on:
      - api

volumes:
  hf_cache:
  eval_results:
  web_node_modules: