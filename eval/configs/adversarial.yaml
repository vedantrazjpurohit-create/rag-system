seed: 42

data:
  raw_dir: data/raw_adversarial
  questions_file: data/adversarial_questions.jsonl

ingestion:
  chunk_size: 512
  chunk_overlap: 64
  splitter: recursive

retrieval:
  embedder: sentence-transformers/all-MiniLM-L6-v2
  strategy: vector
  top_k: 5
  collection_name: rag_eval_adversarial

evaluation:
  metrics:
    - recall_at_k
    - mrr
    - faithfulness
    - citation_coverage
  k: 5

guard:
  enabled: false

guarded:
  enabled: true
  min_vector_score: 0.38
  min_bm25_score: 0.45
  min_hybrid_score: 0.35
  filter_superseded: true
  reject_unseen_numerics: true