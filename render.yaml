# One-click public site: API + Next.js in a single container
# Render Dashboard → New → Blueprint → connect repo → deploy
services:
  - type: web
    name: rag-system
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api-proxy/health
    envVars:
      - key: HF_HOME
        value: /app/.hf_cache
      - key: PYTHONPATH
        value: /app/api:/app/eval
      - key: CHROMA_PATH
        value: /app/data/chroma
      - key: API_PROXY_TARGET
        value: http://127.0.0.1:8000
      - key: ALLOW_VERCEL_PREVIEWS
        value: "false"
      - key: RAG_API_KEY
        sync: false
      - key: RAG_ADMIN_KEY
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: STRICT_TENANT_UUID
        value: "true"
      - key: EMBEDDER_BACKEND
        value: fastembed
      - key: EMBEDDER_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: DEFAULT_STRATEGY
        value: bm25
      - key: ENABLE_HSTS
        value: "true"
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5