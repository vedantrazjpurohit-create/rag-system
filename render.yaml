# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect this repo
services:
  - type: web
    name: rag-system-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HF_HOME
        value: /app/.hf_cache
      - key: PYTHONPATH
        value: /app/api:/app/eval
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5