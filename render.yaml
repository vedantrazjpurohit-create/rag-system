# API-only service on Render. Frontend deploys separately on Vercel (web/).
# Render Dashboard → New → Blueprint → connect this repo
services:
  - type: web
    name: rag-system
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HF_HOME
        value: /app/.hf_cache
      - key: PYTHONPATH
        value: /app/api:/app/eval
      - key: CHROMA_PATH
        value: /app/data/chroma
      - key: ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: RAG_API_KEY
        sync: false
      - key: RAG_ADMIN_KEY
        sync: false
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: STRICT_TENANT_UUID
        value: "true"
      - key: EMBEDDER_BACKEND
        value: fastembed
      - key: EMBEDDER_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: DEFAULT_STRATEGY
        value: bm25
      - key: ENABLE_HSTS
        value: "true"
      - key: MAX_UPLOAD_BYTES
        value: "5242880"
      - key: PDF_PARSE_IN_PROCESS
        value: "true"
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5
      # Set after Vercel deploy (https://your-app.vercel.app)
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
